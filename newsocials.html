---
layout: defaultld
---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1, shrink-to-fit=no" name="viewport">
  <link rel="icon" href="https://github.com/workersmakepossible/labourday/blob/main/assets/wmp_logo.png?raw=true">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ '/assets/css/labourday.css' | relative_url }}">
  <title>{{ site.page_title }}</title>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     DESKTOP LAYOUT
════════════════════════════════════════════════════════════ -->
<div class="desktop-display">

  <!-- NAV BANNER -->
  <div class="titlebanner container-fluid"></div>
  <div class="title container h1">
    <span class="moveleft">{{ site.title }}</span>
  </div>
  <div class="container h1">
    <button class="logo btn btn-lg btn-block">
      <img src="{{ site.logo_url }}" class="deskybutton img-responsive">
    </button>
  </div>

  <div class="navbanner container-fluid">
    <div class="container">
      <div class="row">
        {% for link in site.nav_links %}
        <div class="navcol">
          <button class="btn navbutton {% if link.active %}currentpage{% endif %}">
            <a href="{{ link.url }}">{{ link.label }}</a>
          </button>
        </div>
        {% endfor %}
      </div>
    </div>
  </div>

  <!--INSTA NEW DESKTOP -->
  <div class="start">
    <div style="z-index:10000; margin-top:20px;" class="container">
      <div class="row pt-3" id="pledgescroll">
        <span class="h2" style="color:{{ site.colors.primary }}; font-weight:bolder;">
          Newest Instagram posts
        </span>
      </div>
      <div data-behold-id="1YQIyYCvQQRTr2yMBgkz"></div>
        <script>
          (function() {
            const d=document,s=d.createElement("script");s.type="module";
            s.src="https://w.behold.so/widget.js";d.head.append(s);
          })();
        </script>
    </div>
  </div>


<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>
</body>
</html>
